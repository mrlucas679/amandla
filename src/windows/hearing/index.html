<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AMANDLA — Hearing</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="../../styles/design-system.css">
  <link rel="stylesheet" href="../../styles/animations.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D0D0D;
      color: #F5F0E8;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      background: #111;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    #topbar .brand { font-size: 16px; font-weight: 700; letter-spacing: 1px; color: #2EA880; }
    #topbar .right { display: flex; align-items: center; gap: 11px; }
    #conn-status { font-size: 11px; color: #888; }
    #conn-status.connected { color: #2EA880; }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #2EA880; flex-shrink: 0;
      transition: background 0.3s; cursor: default;
    }
    #status-dot.offline { background: #FC8181; }
    #rights-btn {
      padding: 6px 12px; border-radius: 6px;
      border: 1px solid #8B6FD4; background: transparent;
      color: #8B6FD4; cursor: pointer; font-size: 12px; font-weight: 700;
      transition: background 0.2s;
    }
    #rights-btn:hover { background: #8B6FD420; }

    /* ── TURN INDICATOR ── */
    #turn-indicator {
      flex-shrink: 0;
      text-align: center;
      padding: 4px 14px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
      color: #555; background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      transition: color 0.3s;
    }
    #turn-indicator.hearing { color: #2EA880; }
    #turn-indicator.deaf    { color: #8B6FD4; }

    /* ── MESSAGE LOG ── */
    #message-log {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      background: #0a0a0a;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #message-log::-webkit-scrollbar { width: 4px; }
    #message-log::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .msg-item {
      padding: 9px 13px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      max-width: 88%;
      word-break: break-word;
      animation: msg-in 0.15s ease;
    }
    @keyframes msg-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .msg-out {
      background: #0B2518;
      border: 1px solid #2EA88045;
      color: #F5F0E8;
      align-self: flex-end;
    }
    .msg-in-deaf {
      background: #1a1230;
      border: 1px solid #8B6FD445;
      color: #C4B5FD;
      align-self: flex-start;
    }
    .msg-meta { font-size: 11px; color: #555; margin-top: 3px; }

    /* ── TRANSCRIPT ── */
    #transcript-strip {
      padding: 7px 14px;
      background: #0B1510;
      border-top: 1px solid #1a2e22;
      font-size: 13px; color: #888;
      min-height: 32px; flex-shrink: 0;
    }
    #transcript-strip span { color: #F5F0E8; }

    /* ── CONTROLS ── */
    #controls {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 14px;
      background: #111; border-top: 1px solid #222;
      flex-shrink: 0;
    }
    #mic-btn {
      width: 50px; height: 50px; border-radius: 50%;
      border: none; background: #2EA880;
      color: #082018; font-size: 20px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    #mic-btn:active { transform: scale(0.94); }
    #mic-btn.recording { background: #FC8181; animation: pulse 1.2s infinite; }
    #mic-btn:disabled  { background: #444; cursor: not-allowed; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 #FC818160; }
      50%       { box-shadow: 0 0 0 10px #FC818100; }
    }
    #rec-timer { font-size: 12px; color: #FC8181; min-width: 36px; text-align: center; font-variant-numeric: tabular-nums; }
    #text-input {
      flex: 1; padding: 11px 13px;
      border-radius: 9px; border: 1px solid #2EA880;
      background: #0B0B0B; color: #fff; font-size: 14px;
    }
    #text-input:focus { outline: none; border-color: #4ecba0; }
    #send-btn {
      padding: 11px 16px; border-radius: 9px; border: none;
      background: #2EA880; color: #082018;
      cursor: pointer; font-weight: 700; font-size: 13px; flex-shrink: 0;
      transition: background 0.2s;
    }
    #send-btn:hover { background: #26966f; }

    /* ── EMERGENCY OVERLAY ── */
    #emergency-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(229,62,62,0.95);
      flex-direction: column; align-items: center;
      justify-content: center; gap: 20px;
      text-align: center; padding: 40px;
      animation: emg-pulse 1s ease-in-out infinite;
    }
    #emergency-overlay.active { display: flex; }
    @keyframes emg-pulse {
      0%, 100% { background: rgba(229,62,62,0.95); }
      50%       { background: rgba(200,30,30,0.98); }
    }
    .emg-icon  { font-size: 72px; }
    .emg-title { font-size: 52px; font-weight: 900; color: #fff; letter-spacing: -2px; }
    .emg-sub   { font-size: 20px; color: rgba(255,255,255,0.85); }
    .emg-dismiss {
      background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 15px; font-weight: 700;
      padding: 14px 36px; border-radius: 12px; cursor: pointer; margin-top: 10px;
    }
    .emg-dismiss:hover { background: rgba(255,255,255,0.35); }

    /* ── STARTUP OVERLAY ── */
    #startup-overlay {
      position: fixed; inset: 0; z-index: 9998;
      background: #0D0D0D;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; padding: 32px;
    }
    #startup-overlay h1 { font-size: 36px; color: #2EA880; letter-spacing: 2px; }
    #startup-overlay p  { color: #aaa; text-align: center; max-width: 380px; line-height: 1.5; }
    #start-btn {
      padding: 14px 48px; border-radius: 12px; border: none;
      background: #2EA880; color: #082018; font-size: 20px; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    #start-btn:hover { background: #26966f; }

    /* ── CONNECTION ERROR BANNER ── */
    #conn-banner {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; z-index: 9997;
      background: #FC818130; border-bottom: 2px solid #FC8181;
      padding: 10px 16px; text-align: center;
      font-size: 13px; color: #FCA5A5;
      animation: banner-in 0.3s ease;
    }
    #conn-banner.visible { display: flex; align-items: center; justify-content: center; gap: 12px; }
    #conn-banner button { background: #FC818140; border: 1px solid #FC8181; color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    @keyframes banner-in { from { transform: translateY(-100%); } to { transform: translateY(0); } }

    /* ── EMERGENCY COUNTDOWN ── */
    .emg-countdown { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 6px; }
  </style>
</head>
<body>

  <!-- Connection error banner -->
  <div id="conn-banner">Connection lost — reconnecting…<button onclick="this.parentElement.classList.remove('visible')">Dismiss</button></div>

  <!-- Emergency overlay -->
  <div id="emergency-overlay" role="alertdialog" aria-label="Emergency alert">
    <div class="emg-icon">🚨</div>
    <div class="emg-title">EMERGENCY</div>
    <div class="emg-sub">Signer has triggered an emergency alert</div>
    <div class="emg-countdown" id="emg-countdown"></div>
    <button class="emg-dismiss" onclick="hideEmergency()">Dismiss</button>
  </div>

  <!-- Startup overlay -->
  <div id="startup-overlay">
    <h1>AMANDLA</h1>
    <p>Sign language communication bridge.<br>Click to begin your session.</p>
    <button id="start-btn">START SESSION</button>
  </div>

  <!-- Top bar -->
  <div id="topbar">
    <div class="brand">AMANDLA — Hearing</div>
    <div class="right">
      <span id="conn-status">connecting…</span>
      <div id="status-dot" title="AI status: checking…"></div>
      <button id="rights-btn">RIGHTS</button>
    </div>
  </div>

  <!-- Turn indicator -->
  <div id="turn-indicator">Waiting…</div>

  <!-- Message log -->
  <div id="message-log"></div>

  <!-- Last transcript + detected language badge -->
  <div id="transcript-strip">
    Last message: <span id="transcript-text">—</span>
    <span id="lang-badge" style="margin-left:10px;font-size:11px;color:#8B6FD4;font-weight:700;"></span>
  </div>

  <!-- Input controls -->
  <div id="controls">
    <button id="mic-btn" title="Click to record" disabled>🎙</button>
    <span id="rec-timer"></span>
    <input id="text-input" type="text" placeholder="Or type a message and press Enter…" autocomplete="off" />
    <button id="send-btn">Send</button>
  </div>

  <script>
    // ── DOM REFS ──────────────────────────────────────────────
    const overlay      = document.getElementById('startup-overlay')
    const startBtn     = document.getElementById('start-btn')
    const connStatus   = document.getElementById('conn-status')
    const statusDot    = document.getElementById('status-dot')
    const rightsBtn    = document.getElementById('rights-btn')
    const micBtn       = document.getElementById('mic-btn')
    const recTimer     = document.getElementById('rec-timer')
    const textInput    = document.getElementById('text-input')
    const sendBtn      = document.getElementById('send-btn')
    const transcriptEl = document.getElementById('transcript-text')
    const turnEl       = document.getElementById('turn-indicator')

    // ── STARTUP ───────────────────────────────────────────────
    startBtn.addEventListener('click', function () {
      overlay.style.display = 'none'
      try {
        const u = new SpeechSynthesisUtterance(' ')
        u.volume = 0
        window.speechSynthesis.speak(u)
      } catch (e) { /* ignore */ }
      micBtn.disabled = false
      textInput.focus()
    })

    // ── MESSAGE LOG ───────────────────────────────────────────
    const msgLog = document.getElementById('message-log')
    function addMessage(text, direction, meta) {
      const item = document.createElement('div')
      item.className = 'msg-item ' + (direction === 'out' ? 'msg-out' : 'msg-in-deaf')
      item.textContent = text
      if (meta) {
        const m = document.createElement('div')
        m.className = 'msg-meta'
        m.textContent = meta
        item.appendChild(m)
      }
      msgLog.appendChild(item)
      msgLog.scrollTop = msgLog.scrollHeight
      // Keep log from growing too long
      while (msgLog.children.length > 60) msgLog.removeChild(msgLog.firstChild)
    }

    // ── CONNECTION ────────────────────────────────────────────
    window.amandla.getSessionId().then(function (id) {
      window.amandla.connect(id || 'demo', 'hearing')
    }).catch(function () {
      window.amandla.connect('demo', 'hearing')
    })

    let wsConnected = false
    let statusPollingStarted = false
    window.amandla.onConnectionChange(function (connected) {
      wsConnected = connected
      connStatus.textContent = connected ? 'connected' : 'disconnected'
      connStatus.className   = connected ? 'connected' : ''
      // Show/hide connection error banner
      const banner = document.getElementById('conn-banner')
      if (banner) banner.classList.toggle('visible', !connected)
      // Start status polling only after first successful connection
      if (connected && !statusPollingStarted) {
        statusPollingStarted = true
        pollStatus()
        setInterval(pollStatus, 30000)
      }
    })

    // ── INCOMING MESSAGES ─────────────────────────────────────
    window.amandla.onMessage(function (msg) {
      if (!msg) return

      // Deaf user tapped quick-sign or typed SASL — show indicator while translation is in progress
      if ((msg.type === 'sign' || msg.type === 'sasl_text') && msg.sender === 'deaf') {
        transcriptEl.textContent = '🤟 Signer is communicating…'
        return
      }

      // Signs echoed back from our own speech — no avatar on this side
      if (msg.type === 'signs') return

      // Deaf person's signs reconstructed to natural English — show + speak
      if (msg.type === 'deaf_speech' && msg.text) {
        addMessage('🤟 ' + msg.text, 'in', 'via signs')
        transcriptEl.textContent = '🤟 ' + msg.text
        speakText(msg.text)
        return
      }

      // Turn indicator
      if (msg.type === 'turn') {
        setTurnIndicator(msg.speaker)
        return
      }

      if (msg.type === 'emergency') {
        showEmergency()
      }
    })

    // ── TURN INDICATOR ────────────────────────────────────────
    function setTurnIndicator(speaker) {
      if (speaker === 'hearing') {
        turnEl.textContent = '🎙 You are speaking'
        turnEl.className = 'hearing'
      } else if (speaker === 'deaf') {
        turnEl.textContent = '🤟 Signer is signing'
        turnEl.className = 'deaf'
      } else {
        turnEl.textContent = 'Waiting…'
        turnEl.className = ''
      }
      clearTimeout(window._turnTimer)
      window._turnTimer = setTimeout(function () {
        turnEl.textContent = 'Waiting…'
        turnEl.className = ''
      }, 4000)
    }

    // ── SEND TEXT ─────────────────────────────────────────────
    function sendText(text, detectedLang) {
      if (!text) return
      if (!wsConnected) {
        transcriptEl.textContent = '⚠ Not connected — is the backend running? (npm start)'
        return
      }
      transcriptEl.textContent = '🎙 ' + text
      if (detectedLang) setDetectedLanguage(detectedLang)
      addMessage(text, 'out')
      window.amandla.send({
        type:      'text',
        text:      text,
        language:  detectedLang || null,
        sender:    'hearing',
        timestamp: Date.now()
      })
      setTurnIndicator('hearing')
    }

    sendBtn.addEventListener('click', function () {
      const t = textInput.value.trim()
      if (!t) return
      sendText(t)
      textInput.value = ''
    })
    textInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') sendBtn.click()
    })

    // ── MICROPHONE RECORDING ──────────────────────────────────
    let mediaRecorder = null
    let audioChunks   = []
    let recInterval   = null
    let recSeconds    = 0
    let isRecording   = false

    async function startRecording() {
      if (isRecording) return stopRecording()
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true })
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus'
          : MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')
            ? 'audio/ogg;codecs=opus'
            : 'audio/mp4'

        mediaRecorder = new MediaRecorder(stream, { mimeType })
        audioChunks = []

        mediaRecorder.ondataavailable = function (e) {
          if (e.data.size > 0) audioChunks.push(e.data)
        }
        mediaRecorder.onstop = async function () {
          const blob = new Blob(audioChunks, { type: mimeType })
          stream.getTracks().forEach(function (t) { t.stop() })
          await uploadAudio(blob, mimeType)
        }

        mediaRecorder.start()
        isRecording = true
        micBtn.classList.add('recording')
        micBtn.textContent = '⏹'
        recSeconds = 0
        recTimer.textContent = '0:00'
        recInterval = setInterval(function () {
          recSeconds++
          const m = Math.floor(recSeconds / 60)
          const s = recSeconds % 60
          recTimer.textContent = m + ':' + String(s).padStart(2, '0')
          if (recSeconds >= 30) stopRecording()
        }, 1000)
      } catch (err) {
        console.error('[Hearing] Mic error:', err)
        transcriptEl.textContent = 'Microphone access denied'
      }
    }

    function stopRecording() {
      if (!isRecording || !mediaRecorder) return
      mediaRecorder.stop()
      isRecording = false
      micBtn.classList.remove('recording')
      micBtn.textContent = '🎙'
      clearInterval(recInterval)
      recTimer.textContent = ''
    }

    async function uploadAudio(blob, mimeType) {
      // Upload speech audio via WebSocket preload bridge (no direct HTTP fetch)
      transcriptEl.textContent = 'Transcribing…'

      // On slow machines Whisper takes 15–45 s to load on first use.
      // After 3 s without a result, show a friendlier message so the user
      // knows the app hasn't frozen.
      let whisperLoadTimer = setTimeout(function () {
        transcriptEl.textContent = 'Loading speech model (first time only — please wait)…'
      }, 3000)

      try {
        const data = await window.amandla.uploadSpeech(blob, mimeType)
        clearTimeout(whisperLoadTimer) // result arrived — cancel the slow-load message
        if (data.text) {
          sendText(data.text, data.language || null)
        } else {
          transcriptEl.textContent = 'Could not transcribe — try typing'
        }
      } catch (err) {
        clearTimeout(whisperLoadTimer)
        console.error('[Hearing] Upload error:', err)
        transcriptEl.textContent = 'Transcription failed — try typing instead'
      }
    }

    micBtn.addEventListener('click', startRecording)

    // ── RIGHTS WINDOW ─────────────────────────────────────────
    rightsBtn.addEventListener('click', function () { window.amandla.openRights() })

    // ── EMERGENCY ─────────────────────────────────────────────
    let _emgInterval = null
    function showEmergency() {
      document.getElementById('emergency-overlay').classList.add('active')
      speakText('Emergency. Signer has triggered an emergency alert.')
      // Countdown timer — auto-dismiss after 10 seconds
      let remaining = 10
      const cdEl = document.getElementById('emg-countdown')
      if (cdEl) cdEl.textContent = 'Auto-dismiss in ' + remaining + 's'
      clearInterval(_emgInterval)
      _emgInterval = setInterval(function () {
        remaining--
        if (cdEl) cdEl.textContent = remaining > 0 ? 'Auto-dismiss in ' + remaining + 's' : ''
        if (remaining <= 0) { hideEmergency(); clearInterval(_emgInterval) }
      }, 1000)
    }
    function hideEmergency() {
      document.getElementById('emergency-overlay').classList.remove('active')
      clearInterval(_emgInterval)
      const cdEl = document.getElementById('emg-countdown')
      if (cdEl) cdEl.textContent = ''
    }
    window.hideEmergency = hideEmergency

    // ── MULTI-LANGUAGE TTS (Gap 15) ───────────────────────────
    // All 11 official South African languages.
    // Whisper auto-detects the spoken language; TTS switches to match.
    // Not all languages have TTS voice packs on every machine — Whisper
    // transcribes them all; TTS falls back to any English voice if needed.
    const SA_LANGUAGES = {
      'en':  { tts: 'en-ZA',  label: 'English',    whisper: 'en'  },
      'zu':  { tts: 'zu-ZA',  label: 'isiZulu',    whisper: 'zu'  },
      'xh':  { tts: 'xh-ZA',  label: 'isiXhosa',   whisper: 'xh'  },
      'af':  { tts: 'af-ZA',  label: 'Afrikaans',   whisper: 'af'  },
      'st':  { tts: 'st-ZA',  label: 'Sesotho',    whisper: 'st'  },
      'tn':  { tts: 'tn-ZA',  label: 'Setswana',   whisper: 'tn'  },
      'nso': { tts: 'nso-ZA', label: 'Sepedi',     whisper: null  },
      'ts':  { tts: 'ts-ZA',  label: 'Xitsonga',   whisper: null  },
      've':  { tts: 've-ZA',  label: 'Tshivenda',  whisper: null  },
      'nr':  { tts: 'nr-ZA',  label: 'isiNdebele', whisper: null  },
      'ss':  { tts: 'ss-ZA',  label: 'siSwati',    whisper: null  },
    }

    // Persists across calls — updated when Whisper returns a language code
    let currentTTSLang = 'en-ZA'

    function setDetectedLanguage(whisperLangCode) {
      if (!whisperLangCode) return
      const entry = SA_LANGUAGES[whisperLangCode]
      if (entry) {
        currentTTSLang = entry.tts
        const badge = document.getElementById('lang-badge')
        if (badge) badge.textContent = entry.label
      }
    }

    function getBestVoice(lang) {
      const voices = window.speechSynthesis.getVoices()
      return voices.find(function (v) { return v.lang === lang })
          || voices.find(function (v) { return v.lang.startsWith(lang.split('-')[0]) })
          || voices.find(function (v) { return v.lang.startsWith('en') })
          || (voices[0] || null)
    }

    function speakText(text, lang) {
      // lang arg overrides currentTTSLang only for this call
      const useLang = lang || currentTTSLang
      if (window.speechSynthesis.paused) window.speechSynthesis.resume()
      if (window.speechSynthesis.speaking) window.speechSynthesis.cancel()
      const u = new SpeechSynthesisUtterance(text)
      const voice = getBestVoice(useLang)
      if (voice) u.voice = voice
      u.rate = 0.95
      window.speechSynthesis.speak(u)
    }

    // ── STATUS POLLING (via WebSocket preload bridge) ───────
    // Polling is started in onConnectionChange after first WS connection
    async function pollStatus() {
      try {
        const d = await window.amandla.requestStatus()
        statusDot.className = d.qwen === 'alive' ? '' : 'offline'
        statusDot.title     = d.qwen === 'alive' ? 'AI online' : 'AI offline — restart Ollama'
      } catch (e) {
        statusDot.className = 'offline'
        statusDot.title     = 'Backend offline'
      }
    }
  </script>
</body>
</html>
