<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AMANDLA — Deaf</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D0D0D;
      color: #F5F0E8;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 14px;
      background: #111;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
      gap: 10px;
    }
    #topbar .brand { font-size: 14px; font-weight: 700; letter-spacing: 1px; color: #8B6FD4; white-space: nowrap; }
    #topbar .right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #conn-status { font-size: 11px; color: #888; }
    #conn-status.connected { color: #2EA880; }
    #status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #2EA880; flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.offline { background: #FC8181; }

    /* ── TURN INDICATOR ── */
    #turn-indicator {
      flex-shrink: 0;
      text-align: center;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #555;
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      transition: color 0.3s;
    }
    #turn-indicator.hearing { color: #2EA880; }
    #turn-indicator.deaf    { color: #8B6FD4; }

    /* ── AVATAR fills most of the height ── */
    #avatar-panel {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    #avatar-canvas { width: 100%; height: 100%; display: block; }

    #avatar-sign-label {
      position: absolute;
      bottom: 50px; left: 50%; transform: translateX(-50%);
      font-size: 24px; font-weight: 700;
      color: #fff; text-shadow: 0 2px 12px #000;
      letter-spacing: 2px; pointer-events: none; white-space: nowrap;
    }
    #detected-sign {
      font-size: 42px; font-weight: 700; color: #2EA880;
      text-align: center; opacity: 0;
      transition: opacity 0.3s; margin: 6px 0;
      letter-spacing: 1px; pointer-events: none;
      position: absolute; top: 10px; left: 0; right: 0;
    }
    /* SASL gloss — prominent display, all caps */
    #gloss-display {
      position: absolute;
      bottom: 28px; left: 0; right: 0;
      padding: 4px 16px;
      font-size: 22px; font-weight: 800;
      color: #C4B5FD; letter-spacing: 3px;
      text-align: center; pointer-events: none;
      text-shadow: 0 2px 8px #000a;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Original English — smaller, below the SASL gloss */
    #sentence-display {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 4px 16px;
      background: linear-gradient(transparent, #000c);
      font-size: 12px; color: #888;
      text-align: center; pointer-events: none; min-height: 28px;
      font-style: italic;
    }

    /* ── CAMERA PANEL ── */
    #camera-panel {
      flex-shrink: 0;
      position: relative;
      height: 130px;
      background: #000;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #camera-panel.hidden { display: none; }

    #camera-video {
      height: 100%;
      width: auto;
      display: block;
      transform: scaleX(-1);   /* mirror for natural feel */
    }
    #camera-canvas {
      position: absolute;
      top: 0; left: 0;
      height: 100%; width: 100%;
      pointer-events: none;
      transform: scaleX(-1);
    }
    #camera-label {
      position: absolute;
      top: 6px; left: 10px;
      font-size: 11px; color: #8B6FD4;
      font-weight: 700; letter-spacing: 0.5px;
      pointer-events: none;
    }
    #sign-preview {
      position: absolute;
      top: 6px; right: 10px;
      font-size: 13px; font-weight: 700;
      color: #2EA880;
      pointer-events: none;
    }
    #cam-toggle {
      position: absolute;
      bottom: 6px; right: 8px;
      font-size: 11px; color: #555; cursor: pointer;
      background: #111; border: 1px solid #333;
      border-radius: 4px; padding: 2px 7px;
    }
    #cam-toggle:hover { color: #8B6FD4; border-color: #8B6FD4; }

    /* ── CATEGORY TABS ── */
    #category-tabs {
      flex-shrink: 0;
      display: flex; gap: 2px; padding: 4px 8px 0;
      background: #0a0a0a;
      border-top: 1px solid #1c1c1c;
      overflow-x: auto;
    }
    .cat-tab {
      background: transparent; border: none;
      color: #6B5C48; font-size: 11px; font-weight: 700;
      padding: 5px 9px; cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap; letter-spacing: 0.3px;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .cat-tab:hover { color: #F5F0E8; }
    .cat-tab.active { color: #8B6FD4; border-bottom-color: #8B6FD4; }

    /* ── QUICK-SIGN BUTTONS ── */
    #quick-signs {
      flex-shrink: 0;
      display: flex; flex-wrap: wrap;
      gap: 6px; padding: 6px 10px 8px;
      background: #0a0a0a;
      justify-content: center;
      min-height: 44px;
    }
    .qs-btn {
      padding: 7px 12px; border-radius: 7px;
      border: 1px solid #8B6FD480;
      background: #1a1230; color: #C4B5FD;
      font-size: 12px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      user-select: none;
    }
    .qs-btn:hover  { background: #8B6FD430; border-color: #8B6FD4; }
    .qs-btn:active { transform: scale(0.94); }
    .qs-btn.sent   { border-color: #2EA880; color: #2EA880; background: #0f2e20; }
    .qs-btn.emergency {
      border-color: #FC818180; background: #2e0a0a; color: #FCA5A5;
    }
    .qs-btn.emergency:hover { background: #FC818130; border-color: #FC8181; }

    /* ── EMERGENCY OVERLAY ── */
    #emergency-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(229,62,62,0.95);
      flex-direction: column; align-items: center;
      justify-content: center; gap: 20px;
      text-align: center; padding: 40px;
      animation: emg-pulse 1s ease-in-out infinite;
    }
    #emergency-overlay.active { display: flex; }
    @keyframes emg-pulse {
      0%, 100% { background: rgba(229,62,62,0.95); }
      50%       { background: rgba(200,30,30,0.98); }
    }
    .emg-icon  { font-size: 72px; }
    .emg-title { font-size: 52px; font-weight: 900; color: #fff; letter-spacing: -2px; }
    .emg-sub   { font-size: 20px; color: rgba(255,255,255,0.85); }
    .emg-dismiss {
      background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 15px; font-weight: 700;
      padding: 14px 36px; border-radius: 12px; cursor: pointer;
      margin-top: 10px;
    }
    .emg-dismiss:hover { background: rgba(255,255,255,0.35); }

    /* ── CSS VARIABLES (used by AssistEngine UI) ── */
    :root {
      --color-background-primary:   #0D0D0D;
      --color-background-secondary: #1a1a1a;
      --color-background-tertiary:  #252525;
      --color-background-info:      #1a1230;
      --color-background-success:   #0f2e20;
      --color-border-secondary:     #333;
      --color-border-tertiary:      #2a2a2a;
      --color-border-info:          #8B6FD4;
      --color-border-success:       #2EA88080;
      --color-text-primary:         #F5F0E8;
      --color-text-secondary:       #aaa;
      --color-text-tertiary:        #666;
      --color-text-success:         #2EA880;
      --font-sans:                  Arial, Helvetica, sans-serif;
    }

    /* ── ASSIST CONTAINER ── */
    #assistContainer {
      flex: 1;
      min-height: 0;
      background: #0D0D0D;
      overflow-y: auto;
    }

    /* ── MODE TOGGLE BUTTON ── */
    #modeToggleBtn {
      font-size: 11px; font-weight: 700;
      padding: 4px 10px; border-radius: 5px;
      border: 1px solid #8B6FD480;
      background: #1a1230; color: #C4B5FD;
      cursor: pointer; letter-spacing: 0.3px;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    #modeToggleBtn:hover { background: #8B6FD430; border-color: #8B6FD4; }

    /* ── STARTUP OVERLAY ── */
    #startup-overlay {
      position: fixed; inset: 0; z-index: 9998;
      background: #0D0D0D;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px; padding: 32px;
    }
    #startup-overlay h1 { font-size: 30px; color: #8B6FD4; letter-spacing: 2px; }
    #startup-overlay p  { color: #aaa; text-align: center; max-width: 360px; line-height: 1.5; }
    #start-btn {
      padding: 13px 46px; border-radius: 12px; border: none;
      background: #8B6FD4; color: #fff; font-size: 19px; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    #start-btn:hover { background: #7058bc; }
  </style>
</head>
<body>

  <!-- Emergency overlay (shown on both windows simultaneously) -->
  <div id="emergency-overlay" role="alertdialog" aria-label="Emergency alert">
    <div class="emg-icon">🚨</div>
    <div class="emg-title">EMERGENCY</div>
    <div class="emg-sub">Help has been alerted</div>
    <button class="emg-dismiss" onclick="hideEmergency()">Dismiss</button>
  </div>

  <!-- Startup overlay — unlocks TTS -->
  <div id="startup-overlay">
    <h1>AMANDLA</h1>
    <p>Deaf view — signs appear here when the hearing person speaks.<br>
       Use buttons below to reply. Allow camera access for hand tracking.</p>
    <button id="start-btn">READY</button>
  </div>

  <!-- Top bar -->
  <div id="topbar">
    <div class="brand">AMANDLA — Deaf</div>
    <div class="right">
      <span id="conn-status">connecting…</span>
      <div id="status-dot" title="AI status"></div>
      <button id="modeToggleBtn" onclick="ModeController.toggle()">Assist Mode</button>
    </div>
  </div>

  <!-- Turn indicator -->
  <div id="turn-indicator">Waiting…</div>

  <!-- Avatar (incoming signs from hearing person) -->
  <div id="avatar-panel">
    <div id="avatar-canvas"></div>
    <div id="avatar-sign-label"></div>
    <div id="detected-sign"></div>
    <div id="gloss-display"></div>
    <div id="sentence-display"></div>
  </div>

  <!-- Assist mode: AAC-style phrase completion (hidden by default) -->
  <div id="assistContainer" style="display:none"></div>

  <!-- Camera panel: deaf person's hand shown with MediaPipe skeleton -->
  <div id="camera-panel">
    <video id="camera-video" playsinline muted></video>
    <canvas id="camera-canvas"></canvas>
    <div id="camera-label">HAND TRACKING</div>
    <div id="sign-preview"></div>
    <button id="cam-toggle" title="Toggle camera">hide cam</button>
  </div>

  <!-- Category tabs + quick-sign reply buttons -->
  <div id="category-tabs" role="tablist" aria-label="Sign categories"></div>
  <div id="quick-signs" role="toolbar" aria-label="Quick signs"></div>

  <!-- ── SCRIPTS: load order is critical ── -->
  <!-- Three.js must come first (for avatar) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <!-- Signs library and avatar -->
  <script src="../../../signs_library.js"></script>
  <script src="avatar.js"></script>
  <!-- Mode controller (sign ↔ assist) — must load before inline script -->
  <script src="mode_controller.js"></script>

  <script>
    // ── DOM REFS ──────────────────────────────────────────────
    const overlay       = document.getElementById('startup-overlay')
    const startBtn      = document.getElementById('start-btn')
    const connStatus    = document.getElementById('conn-status')
    const statusDot     = document.getElementById('status-dot')
    const sentenceEl    = document.getElementById('sentence-display')
    const glossEl       = document.getElementById('gloss-display')
    const turnEl        = document.getElementById('turn-indicator')
    const camPanel      = document.getElementById('camera-panel')
    const camVideo      = document.getElementById('camera-video')
    const camCanvas     = document.getElementById('camera-canvas')
    const signPreview   = document.getElementById('sign-preview')
    const camToggle     = document.getElementById('cam-toggle')

    // ── STARTUP ───────────────────────────────────────────────
    startBtn.addEventListener('click', function () {
      overlay.style.display = 'none'
      try {
        const u = new SpeechSynthesisUtterance(' ')
        u.volume = 0
        window.speechSynthesis.speak(u)
      } catch (e) { /* ignore */ }
      initCamera()
    })

    // ── AVATAR INIT ───────────────────────────────────────────
    function tryInitAvatar() {
      if (typeof THREE !== 'undefined' && window.AmandlaAvatar) {
        window.AmandlaAvatar.initAvatar('avatar-canvas')
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', tryInitAvatar)
    } else {
      tryInitAvatar()
    }

    // ── CONNECTION ────────────────────────────────────────────
    window.amandla.getSessionId().then(function (id) {
      window.amandla.connect(id || 'demo', 'deaf')
    }).catch(function () {
      window.amandla.connect('demo', 'deaf')
    })

    window.amandla.onConnectionChange(function (connected) {
      connStatus.textContent = connected ? 'connected' : 'disconnected'
      connStatus.className   = connected ? 'connected' : ''
    })

    // ── INCOMING MESSAGES ─────────────────────────────────────
    window.amandla.onMessage(function (msg) {
      if (!msg) return

      // Hearing person spoke → SASL signs arrive
      // Deaf window shows SASL grammar only — no original English, no audio (deaf users can't hear)
      if (msg.type === 'signs') {
        const signCount = Array.isArray(msg.signs) ? msg.signs.length : 1
        const clearAfter = (signCount * 700) + 1200

        // Show SASL gloss — this is the language the deaf person understands
        if (msg.text) {
          glossEl.textContent = msg.text
          setTimeout(function () { glossEl.textContent = '' }, clearAfter)
        }

        // Track detected language for internal use (no UI side-effect)
        if (msg.language) setDetectedLanguage(msg.language)

        // Drive the avatar with the sign sequence
        if (Array.isArray(msg.signs) && msg.signs.length > 0) {
          if (ModeController.isSign()) {
            if (window.AmandlaAvatar) {
              msg.signs.forEach(function (s) { window.AmandlaAvatar.queueSign(s) })
            } else {
              glossEl.textContent = msg.text || msg.signs.join(' ')
            }
          }
        }
        return
      }

      // Turn indicator broadcast
      if (msg.type === 'turn') {
        setTurnIndicator(msg.speaker)
        return
      }

      if (msg.type === 'emergency') {
        showEmergency()
        return
      }

      // Backend echoes back recognised landmark sign to confirm detection
      if (msg.type === 'sign' && msg.source === 'mediapipe' && msg.sender === 'deaf') {
        signPreview.textContent = '✓ ' + msg.text
        setTimeout(function () { signPreview.textContent = '' }, 1500)
        showDetectedSign(msg.text, msg.confidence || 0.8)
        return
      }
    })

    // ── TURN INDICATOR ────────────────────────────────────────
    function setTurnIndicator(speaker) {
      if (speaker === 'hearing') {
        turnEl.textContent = '🎙 Hearing person is speaking'
        turnEl.className = 'hearing'
      } else if (speaker === 'deaf') {
        turnEl.textContent = '🤟 Signer is signing'
        turnEl.className = 'deaf'
      } else {
        turnEl.textContent = 'Waiting…'
        turnEl.className = ''
      }
      // Auto-reset after 4s
      clearTimeout(window._turnTimer)
      window._turnTimer = setTimeout(function () {
        turnEl.textContent = 'Waiting…'
        turnEl.className = ''
      }, 4000)
    }

    // ── QUICK-SIGN CATEGORY BUTTONS ───────────────────────────
    const CATEGORIES = {
      'MEDICAL':   ['DOCTOR', 'NURSE', 'HOSPITAL', 'SICK', 'PAIN', 'AMBULANCE', 'MEDICINE', 'HURT', 'EMERGENCY'],
      'GREETINGS': ['HELLO', 'GOODBYE', 'PLEASE', 'THANK YOU', 'SORRY', 'YES', 'NO'],
      'EMOTIONS':  ['HAPPY', 'SAD', 'ANGRY', 'SCARED', 'LOVE', 'TIRED', 'HUNGRY', 'THIRSTY'],
      'ACTIONS':   ['HELP', 'WAIT', 'STOP', 'REPEAT', 'COME', 'GO', 'LISTEN', 'UNDERSTAND'],
      'RIGHTS':    ['RIGHTS', 'LAW', 'EQUAL', 'FREE'],
    }

    const toolbar    = document.getElementById('quick-signs')
    const catBar     = document.getElementById('category-tabs')
    let activeCat    = null

    function renderCategory(category) {
      activeCat = category
      // Highlight active tab
      catBar.querySelectorAll('.cat-tab').forEach(function (t) {
        t.classList.toggle('active', t.dataset.cat === category)
      })
      const signs = CATEGORIES[category] || []
      toolbar.innerHTML = ''
      signs.forEach(function (sign) {
        const btn = document.createElement('button')
        btn.className = 'qs-btn' + (sign === 'EMERGENCY' ? ' emergency' : '')
        btn.textContent = sign
        btn.setAttribute('aria-label', 'Send sign: ' + sign)
        btn.addEventListener('click', function () {
          if (sign === 'EMERGENCY') {
            window.amandla.send({ type: 'emergency', sender: 'deaf', timestamp: Date.now() })
            showEmergency()
            return
          }
          window.amandla.send({ type: 'sign', text: sign, sender: 'deaf', timestamp: Date.now() })
          if (window.AmandlaAvatar) window.AmandlaAvatar.playSignNow(sign)
          showDetectedSign(sign, 1.0)
          btn.classList.add('sent')
          setTimeout(function () { btn.classList.remove('sent') }, 800)
        })
        toolbar.appendChild(btn)
      })
    }

    // Build category tab buttons
    Object.keys(CATEGORIES).forEach(function (cat) {
      const tab = document.createElement('button')
      tab.className = 'cat-tab'
      tab.dataset.cat = cat
      tab.textContent = cat
      tab.setAttribute('role', 'tab')
      tab.addEventListener('click', function () { renderCategory(cat) })
      catBar.appendChild(tab)
    })
    renderCategory('MEDICAL')  // default

    // ── EMERGENCY ─────────────────────────────────────────────
    function showEmergency() {
      document.getElementById('emergency-overlay').classList.add('active')
      speakText('Emergency. Help has been alerted.')
      setTimeout(hideEmergency, 10000)
    }
    function hideEmergency() {
      document.getElementById('emergency-overlay').classList.remove('active')
    }
    window.hideEmergency = hideEmergency

    // ── SIGN DETECTION FEEDBACK ───────────────────────────────
    function showDetectedSign(signName, confidence) {
      const el = document.getElementById('detected-sign')
      if (!el) return
      el.textContent = signName
      el.style.opacity = '1'
      el.style.color = confidence > 0.75 ? '#2EA880' : '#ECC94B'
      clearTimeout(el._hideTimer)
      el._hideTimer = setTimeout(function () { el.style.opacity = '0' }, 2000)
    }

    // ── MEDIAPIPE HAND TRACKING ───────────────────────────────
    let mpHands      = null
    let mpCamera     = null
    let camRunning   = false
    let lastSendTime = 0
    const SEND_INTERVAL_MS = 600   // send landmarks at most every 600ms

    function initCamera() {
      navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 }, audio: false })
        .then(function (stream) {
          camVideo.srcObject = stream
          camVideo.play()
          camPanel.classList.remove('hidden')
          startMediaPipe()
        })
        .catch(function (err) {
          console.warn('[Camera] Access denied or unavailable:', err)
          camPanel.classList.add('hidden')
        })
    }

    function startMediaPipe() {
      if (typeof Hands === 'undefined') {
        console.warn('[MediaPipe] Hands not loaded — hand tracking unavailable')
        return
      }

      mpHands = new Hands({
        locateFile: function (file) {
          return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file
        }
      })

      mpHands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.5
      })

      mpHands.onResults(onHandResults)

      if (typeof Camera !== 'undefined') {
        mpCamera = new Camera(camVideo, {
          onFrame: async function () {
            await mpHands.send({ image: camVideo })
          },
          width: 320,
          height: 240
        })
        mpCamera.start()
        camRunning = true
        console.log('[MediaPipe] Hand tracking started')
      } else {
        // Fallback: manual requestAnimationFrame loop
        camRunning = true
        ;(function loop() {
          if (!camRunning) return
          if (camVideo.readyState >= 2) {
            mpHands.send({ image: camVideo }).catch(function () {})
          }
          setTimeout(loop, 100)
        })()
      }
    }

    function onHandResults(results) {
      // ── Draw skeleton on canvas ──────────────────────────────
      const ctx = camCanvas.getContext('2d')
      camCanvas.width  = camVideo.videoWidth  || 320
      camCanvas.height = camVideo.videoHeight || 240

      ctx.clearRect(0, 0, camCanvas.width, camCanvas.height)

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        for (let i = 0; i < results.multiHandLandmarks.length; i++) {
          const landmarks  = results.multiHandLandmarks[i]
          const handedness = results.multiHandedness && results.multiHandedness[i]
            ? results.multiHandedness[i].label
            : 'Right'

          const color = handedness === 'Left' ? '#8B6FD4' : '#2EA880'

          if (typeof drawConnectors !== 'undefined' && typeof HAND_CONNECTIONS !== 'undefined') {
            drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: color + '99', lineWidth: 2 })
            drawLandmarks(ctx, landmarks, { color: color, lineWidth: 1, radius: 3 })
          } else {
            // Fallback: draw dots manually
            landmarks.forEach(function (lm) {
              ctx.beginPath()
              ctx.arc(lm.x * camCanvas.width, lm.y * camCanvas.height, 4, 0, Math.PI * 2)
              ctx.fillStyle = color
              ctx.fill()
            })
          }

          // ── Send landmarks via WebSocket (debounced) ─────────
          const now = Date.now()
          if (now - lastSendTime >= SEND_INTERVAL_MS) {
            lastSendTime = now
            const points = landmarks.map(function (lm, idx) {
              return { id: idx, x: lm.x, y: lm.y, z: lm.z }
            })
            window.amandla.send({
              type:       'landmarks',
              landmarks:  points,
              handedness: handedness,
              timestamp:  now
            })
          }
        }
        signPreview.textContent = '👁 detecting…'
      } else {
        signPreview.textContent = ''
      }
    }


    // ── CAMERA TOGGLE ─────────────────────────────────────────
    camToggle.addEventListener('click', function () {
      if (camPanel.style.height === '0px' || camPanel.classList.contains('hidden')) {
        camPanel.style.height = '130px'
        camToggle.textContent = 'hide cam'
      } else {
        camPanel.style.height = '0px'
        camToggle.textContent = 'show cam'
      }
    })

    // ── MULTI-LANGUAGE TTS (Gap 15) ───────────────────────────
    // Whisper auto-detects the spoken language; TTS switches to match.
    const SA_LANGUAGES = {
      'en':  { tts: 'en-ZA',  label: 'English'    },
      'zu':  { tts: 'zu-ZA',  label: 'isiZulu'    },
      'xh':  { tts: 'xh-ZA',  label: 'isiXhosa'   },
      'af':  { tts: 'af-ZA',  label: 'Afrikaans'  },
      'st':  { tts: 'st-ZA',  label: 'Sesotho'    },
      'tn':  { tts: 'tn-ZA',  label: 'Setswana'   },
      'nso': { tts: 'nso-ZA', label: 'Sepedi'     },
      'ts':  { tts: 'ts-ZA',  label: 'Xitsonga'   },
      've':  { tts: 've-ZA',  label: 'Tshivenda'  },
      'nr':  { tts: 'nr-ZA',  label: 'isiNdebele' },
      'ss':  { tts: 'ss-ZA',  label: 'siSwati'    },
    }

    let currentTTSLang = 'en-ZA'

    function setDetectedLanguage(code) {
      const entry = code && SA_LANGUAGES[code]
      if (entry) currentTTSLang = entry.tts
    }

    function getBestVoice(lang) {
      const voices = window.speechSynthesis.getVoices()
      return voices.find(function (v) { return v.lang === lang })
          || voices.find(function (v) { return v.lang.startsWith(lang.split('-')[0]) })
          || voices.find(function (v) { return v.lang.startsWith('en') })
          || (voices[0] || null)
    }

    function speakText(text, lang) {
      const useLang = lang || currentTTSLang
      if (window.speechSynthesis.paused) window.speechSynthesis.resume()
      if (window.speechSynthesis.speaking) window.speechSynthesis.cancel()
      const u = new SpeechSynthesisUtterance(text)
      const voice = getBestVoice(useLang)
      if (voice) u.voice = voice
      u.rate = 0.95
      window.speechSynthesis.speak(u)
    }

    // ── ASSIST MODE — send confirmed phrase via WebSocket ─────
    window.addEventListener('amandla:assistPhrase', function (e) {
      const phrase = e.detail && e.detail.phrase
      if (!phrase) return
      window.amandla.send({ type: 'text', text: phrase, sender: 'deaf', timestamp: Date.now() })
      speakText(phrase)
    })

    // ── STATUS POLLING ────────────────────────────────────────
    async function pollStatus() {
      try {
        const r = await fetch('http://localhost:8000/api/status')
        const d = await r.json()
        statusDot.className = d.qwen === 'alive' ? '' : 'offline'
        statusDot.title     = d.qwen === 'alive' ? 'AI online' : 'AI offline'
      } catch (e) {
        statusDot.className = 'offline'
        statusDot.title     = 'Backend offline'
      }
    }
    setInterval(pollStatus, 30000)
    pollStatus()
  </script>
</body>
</html>
