<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AMANDLA — Deaf</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!-- Allow MediaPipe WASM to execute (required in Electron 28 / Chromium 120+) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' data: blob: https: http://localhost:* ws://localhost:*;"  />

  <link rel="stylesheet" href="../../styles/design-system.css" />
  <link rel="stylesheet" href="../../styles/animations.css" />

  <style>
    /* ── LAYOUT ── */
    body {
      background: var(--void);
      color: var(--cream);
      font-family: var(--font-body);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--purple-border);
      box-shadow: 0 1px 0 rgba(176,110,243,0.08);
      flex-shrink: 0;
      gap: 10px;
    }
    #topbar .brand {
      font-family: var(--font-display);
      font-size: 13px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--purple); white-space: nowrap;
    }
    #topbar .brand-icon {
      width: 22px; height: 22px; border-radius: var(--r-sm);
      background: var(--purple-bg);
      border: 1px solid var(--purple-border);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px; margin-right: 6px; vertical-align: middle;
    }
    #topbar .right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    #conn-status {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted);
      padding: 3px 10px; border-radius: var(--r-pill);
      background: var(--surface2); border: 1px solid var(--barrier);
      transition: color var(--t-med) var(--ease), border-color var(--t-med) var(--ease);
    }
    #conn-status.connected {
      color: var(--teal);
      border-color: var(--teal-border);
      background: var(--teal-bg);
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--teal); flex-shrink: 0;
      box-shadow: 0 0 8px rgba(0,212,163,0.7);
      transition: background var(--t-med) var(--ease);
    }
    #status-dot.offline {
      background: var(--crimson);
      box-shadow: 0 0 8px rgba(255,64,96,0.5);
    }

    /* ── TURN INDICATOR ── */
    #turn-indicator {
      flex-shrink: 0;
      text-align: center;
      padding: 4px 14px;
      font-family: var(--font-display);
      font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      color: var(--dim);
      background: var(--surface);
      border-bottom: 1px solid var(--barrier);
      transition: color var(--t-med) var(--ease);
    }
    #turn-indicator.hearing { color: var(--teal); }
    #turn-indicator.deaf    { color: var(--purple); }

    /* ── AVATAR panel ── */
    #avatar-panel {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    #avatar-canvas { width: 100%; height: 100%; display: block; }
    /* GLB loading skeleton shimmer (shown while avatar.glb streams in) */
    #avatar-canvas.skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.4s ease infinite;
    }
    @keyframes skeleton-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    #avatar-sign-label {
      position: absolute;
      bottom: 52px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-display);
      font-size: 20px; font-weight: 700;
      color: var(--cream); text-shadow: 0 2px 16px rgba(0,0,0,0.9);
      letter-spacing: 2px; pointer-events: none; white-space: nowrap;
    }

    /* Sign burst overlay — flashes on detection */
    #detected-sign {
      position: absolute; top: 12px; left: 0; right: 0;
      font-family: var(--font-display);
      font-size: 38px; font-weight: 700;
      text-align: center; opacity: 0;
      letter-spacing: 1px; pointer-events: none;
      text-shadow: 0 0 24px currentColor;
      transition: opacity var(--t-med) var(--ease);
    }
    #detected-sign.show {
      animation: sign-burst 0.45s var(--spring) both;
      opacity: 1;
    }
    #detected-sign.high  { color: var(--teal); }
    #detected-sign.low   { color: var(--gold); }

    /* SASL gloss — prominent, all caps, purple */
    #gloss-display {
      position: absolute;
      bottom: 30px; left: 0; right: 0;
      padding: 4px 16px;
      font-family: var(--font-display);
      font-size: 20px; font-weight: 800;
      color: var(--purple); letter-spacing: 3px;
      text-align: center; pointer-events: none;
      text-shadow: 0 2px 12px rgba(176,110,243,0.4);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Original English — smaller italic below */
    #sentence-display {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 4px 16px;
      background: linear-gradient(transparent, rgba(5,8,16,0.85));
      font-size: 11px; color: var(--muted);
      text-align: center; pointer-events: none; min-height: 28px;
      font-style: italic;
    }

    /* ── CAMERA PANEL ── */
    #camera-panel {
      flex-shrink: 0;
      position: relative;
      height: 128px;
      background: var(--void);
      border-top: 1px solid var(--barrier);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #camera-panel.hidden { display: none; }

    #camera-video {
      height: 100%; width: auto;
      display: block;
      transform: scaleX(-1);
    }
    #camera-canvas {
      position: absolute; top: 0; left: 0;
      height: 100%; width: 100%;
      pointer-events: none;
      transform: scaleX(-1);
    }
    #camera-label {
      position: absolute;
      top: 6px; left: 10px;
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--purple); pointer-events: none;
    }
    #sign-preview {
      position: absolute;
      top: 6px; right: 10px;
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
      color: var(--teal); pointer-events: none;
    }
    #cam-toggle {
      position: absolute;
      bottom: 6px; right: 8px;
      font-family: var(--font-display);
      font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
      color: var(--muted); cursor: pointer;
      background: var(--surface2); border: 1px solid var(--barrier);
      border-radius: var(--r-sm); padding: 2px 8px;
      transition: color var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
    }
    #cam-toggle:hover { color: var(--purple); border-color: var(--purple-border); }

    /* ── CATEGORY TABS ── */
    #category-tabs {
      flex-shrink: 0;
      display: flex; gap: 2px; padding: 4px 8px 0;
      background: var(--surface);
      border-top: 1px solid var(--barrier);
      overflow-x: auto;
    }
    .cat-tab {
      background: transparent; border: none;
      font-family: var(--font-display);
      color: var(--dim); font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 10px; cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
      flex-shrink: 0;
    }
    .cat-tab:hover { color: var(--cream); }
    .cat-tab.active { color: var(--purple); border-bottom-color: var(--purple); }

    /* ── QUICK-SIGN BUTTONS ── */
    #quick-signs {
      flex-shrink: 0;
      display: flex; flex-wrap: wrap;
      gap: 5px; padding: 6px 10px 8px;
      background: var(--surface);
      justify-content: center;
      min-height: 44px;
    }
    .qs-btn {
      padding: 6px 12px; border-radius: var(--r-pill);
      border: 1px solid var(--purple-border);
      background: var(--purple-bg); color: var(--purple);
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      cursor: pointer;
      transition: background var(--t-fast) var(--ease),
                  transform var(--t-fast) var(--ease),
                  border-color var(--t-fast) var(--ease),
                  box-shadow var(--t-fast) var(--ease);
      user-select: none;
    }
    .qs-btn:hover  { background: rgba(176,110,243,0.18); border-color: var(--purple); box-shadow: var(--shadow-purple); }
    .qs-btn:active { transform: scale(0.93); }
    .qs-btn.sent   { border-color: var(--teal-border); color: var(--teal); background: var(--teal-bg); }
    .qs-btn.emergency {
      border-color: var(--crimson-border);
      background: var(--crimson-bg);
      color: var(--crimson);
    }
    .qs-btn.emergency:hover { background: rgba(255,64,96,0.22); border-color: var(--crimson); box-shadow: var(--shadow-crimson); }

    /* ── EMERGENCY OVERLAY ── */
    #emergency-overlay {
      display: none;
      position: fixed; inset: 0; z-index: var(--z-top);
      background: rgba(229,62,62,0.95);
      flex-direction: column; align-items: center;
      justify-content: center; gap: 20px;
      text-align: center; padding: 40px;
      animation: emergency-pulse 1s ease-in-out infinite;
    }
    #emergency-overlay.active { display: flex; }
    .emg-icon  { font-size: 72px; }
    .emg-title {
      font-family: var(--font-display);
      font-size: 52px; font-weight: 900; color: #fff; letter-spacing: -2px;
    }
    .emg-sub   { font-size: 20px; color: rgba(255,255,255,0.85); }
    .emg-dismiss {
      background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-family: var(--font-display);
      font-size: 15px; font-weight: 700;
      padding: 14px 36px; border-radius: var(--r-lg); cursor: pointer;
      margin-top: 10px;
      transition: background var(--t-fast) var(--ease);
    }
    .emg-dismiss:hover { background: rgba(255,255,255,0.35); }

    /* ── ASSIST CONTAINER ── */
    #assistContainer {
      flex: 1; min-height: 0;
      background: var(--void);
      overflow-y: auto;
    }

    /* ── MODE TOGGLE BUTTON ── */
    #modeToggleBtn {
      font-family: var(--font-display);
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      padding: 4px 10px; border-radius: var(--r-pill);
      border: 1px solid var(--purple-border);
      background: var(--purple-bg); color: var(--purple);
      cursor: pointer;
      transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
      white-space: nowrap; flex-shrink: 0;
    }
    #modeToggleBtn:hover { background: rgba(176,110,243,0.15); border-color: var(--purple); }

    /* ── STARTUP OVERLAY ── */
    #startup-overlay {
      position: fixed; inset: 0; z-index: 9998;
      background: var(--void);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; padding: 32px;
      animation: fade-in var(--t-slow) var(--ease) both;
    }
    #startup-overlay .startup-brand {
      font-family: var(--font-display);
      font-size: 32px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
      background: linear-gradient(135deg, var(--purple), var(--teal));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    #startup-overlay p {
      font-family: var(--font-body);
      color: var(--muted); text-align: center;
      max-width: 360px; line-height: 1.6; font-size: 14px;
    }
    #start-btn {
      padding: 13px 46px; border-radius: var(--r-pill); border: none;
      background: linear-gradient(135deg, var(--purple), #8B4FD0);
      color: #fff;
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(176,110,243,0.45);
      transition: transform var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease);
    }
    #start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(176,110,243,0.65); }
    #start-btn:active { transform: scale(0.96); }

    /* ── CSS VARIABLES forwarded for AssistEngine ── */
    :root {
      --color-background-primary:   var(--void);
      --color-background-secondary: var(--surface2);
      --color-background-tertiary:  var(--surface3);
      --color-background-info:      var(--purple-bg);
      --color-background-success:   var(--teal-bg);
      --color-border-secondary:     var(--barrier);
      --color-border-tertiary:      var(--surface4);
      --color-border-info:          var(--purple-border);
      --color-border-success:       var(--teal-border);
      --color-text-primary:         var(--cream);
      --color-text-secondary:       var(--muted);
      --color-text-tertiary:        var(--dim);
      --color-text-success:         var(--teal);
      --font-sans:                  var(--font-body);
    }
  </style>
</head>
<body>

  <!-- Emergency overlay (shown on both windows simultaneously) -->
  <div id="emergency-overlay" role="alertdialog" aria-label="Emergency alert">
    <div class="emg-icon">🚨</div>
    <div class="emg-title">EMERGENCY</div>
    <div class="emg-sub">Help has been alerted</div>
    <button class="emg-dismiss" onclick="hideEmergency()">Dismiss</button>
  </div>

  <!-- Startup overlay — unlocks TTS -->
  <div id="startup-overlay">
    <div class="startup-brand">AMANDLA</div>
    <p>Deaf view — signs appear here when the hearing person speaks.<br>
       Use buttons below to reply. Allow camera access for hand tracking.</p>
    <button id="start-btn">READY</button>
  </div>

  <!-- Top bar -->
  <div id="topbar">
    <div class="brand"><span class="brand-icon">🤟</span>AMANDLA — Deaf</div>
    <div class="right">
      <span id="conn-status">connecting…</span>
      <div id="status-dot" title="AI status"></div>
      <button id="modeToggleBtn" onclick="ModeController.toggle()">Assist Mode</button>
    </div>
  </div>

  <!-- Turn indicator -->
  <div id="turn-indicator">Waiting…</div>

  <!-- Avatar (incoming signs from hearing person) -->
  <div id="avatar-panel">
    <div id="avatar-canvas"></div>
    <div id="avatar-sign-label"></div>
    <div id="detected-sign"></div>
    <div id="gloss-display"></div>
    <div id="sentence-display"></div>
  </div>

  <!-- Assist mode: AAC-style phrase completion (hidden by default) -->
  <div id="assistContainer" style="display:none"></div>

  <!-- Camera panel: deaf person's hand shown with MediaPipe skeleton -->
  <div id="camera-panel">
    <video id="camera-video" playsinline muted></video>
    <canvas id="camera-canvas"></canvas>
    <div id="camera-label">HAND TRACKING</div>
    <div id="hand-count-badge" style="position:absolute;bottom:6px;right:8px;font-size:10px;font-weight:700;color:#fff;background:rgba(0,0,0,0.55);padding:2px 6px;border-radius:8px;pointer-events:none;letter-spacing:0.5px;"></div>
    <div id="sign-preview"></div>
    <button id="cam-toggle" title="Toggle camera">hide cam</button>
  </div>

  <!-- Category tabs + quick-sign reply buttons -->
  <div id="category-tabs" role="tablist" aria-label="Sign categories"></div>
  <div id="quick-signs" role="toolbar" aria-label="Quick signs"></div>

  <!-- ── SCRIPTS: load order is critical ── -->
  <!-- Three.js must come first (for avatar) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- GLTFLoader r128 — required for Mixamo GLB avatar (Step 3: Load into Three.js) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <!-- TF.js hand-pose-detection (WebGL backend — no WASM CDN issues in Electron) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.2.0/dist/tf-core.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.2.0/dist/tf-backend-webgl.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.2.0/dist/tf-converter.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js" crossorigin="anonymous"></script>
  <!-- Signs library (pose data + TransitionEngine) -->
  <script src="../../../signs_library.js"></script>
  <!-- signs_library_v2: BONE_MAP extension (attaches to window.AMANDLA_SIGNS) -->
  <script src="../../../signs_library_v2.js"></script>
  <!-- AvatarDriver: BONE_MAP + Mixamo axis remap + bone binding (Step 4: Map bone names) -->
  <script src="avatar_driver.js"></script>
  <!-- Avatar: GLTFLoader scene + TransitionEngine render loop (Steps 3–4) -->
  <script src="avatar.js"></script>
  <!-- Mode controller (sign ↔ assist) — must load before inline script -->
  <script src="mode_controller.js"></script>

  <script>
    // ── DOM REFS ──────────────────────────────────────────────
    const overlay       = document.getElementById('startup-overlay')
    const startBtn      = document.getElementById('start-btn')
    const connStatus    = document.getElementById('conn-status')
    const statusDot     = document.getElementById('status-dot')
    const sentenceEl    = document.getElementById('sentence-display')
    const glossEl       = document.getElementById('gloss-display')
    const turnEl        = document.getElementById('turn-indicator')
    const camPanel      = document.getElementById('camera-panel')
    const camVideo      = document.getElementById('camera-video')
    const camCanvas     = document.getElementById('camera-canvas')
    const signPreview   = document.getElementById('sign-preview')
    const handBadge     = document.getElementById('hand-count-badge')
    const camToggle     = document.getElementById('cam-toggle')

    // ── STARTUP ───────────────────────────────────────────────
    startBtn.addEventListener('click', function () {
      overlay.style.display = 'none'
      try {
        const u = new SpeechSynthesisUtterance(' ')
        u.volume = 0
        window.speechSynthesis.speak(u)
      } catch (e) { /* ignore */ }
      initCamera()
    })

    // ── AVATAR INIT ───────────────────────────────────────────
    function tryInitAvatar() {
      if (typeof THREE !== 'undefined' && window.AmandlaAvatar) {
        window.AmandlaAvatar.initAvatar('avatar-canvas')
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', tryInitAvatar)
    } else {
      tryInitAvatar()
    }

    // ── CONNECTION ────────────────────────────────────────────
    window.amandla.getSessionId().then(function (id) {
      window.amandla.connect(id || 'demo', 'deaf')
    }).catch(function () {
      window.amandla.connect('demo', 'deaf')
    })

    window.amandla.onConnectionChange(function (connected) {
      connStatus.textContent = connected ? 'connected' : 'disconnected'
      connStatus.className   = connected ? 'connected' : ''
    })

    // ── INCOMING MESSAGES ─────────────────────────────────────
    window.amandla.onMessage(function (msg) {
      if (!msg) return

      // Hearing person spoke → SASL signs arrive
      // Deaf window shows SASL grammar only — no original English, no audio (deaf users can't hear)
      if (msg.type === 'signs') {
        const signCount = Array.isArray(msg.signs) ? msg.signs.length : 1
        const clearAfter = (signCount * 700) + 1200

        // Show SASL gloss — this is the language the deaf person understands
        if (msg.text) {
          glossEl.textContent = msg.text
          setTimeout(function () { glossEl.textContent = '' }, clearAfter)
        }

        // Track detected language for internal use (no UI side-effect)
        if (msg.language) setDetectedLanguage(msg.language)

        // Drive the avatar with the sign sequence
        if (Array.isArray(msg.signs) && msg.signs.length > 0) {
          if (ModeController.isSign()) {
            if (window.AmandlaAvatar) {
              // Apply NMMs before queuing signs — they must onset with the first sign
              const nmms = Array.isArray(msg.non_manual_markers) ? msg.non_manual_markers : []
              if (nmms.length > 0) {
                // Phrase duration = (hold + gap) per sign + final gap
                const phraseDur = msg.signs.length * 0.56 + 0.18
                window.AmandlaAvatar.setNMMs(nmms, phraseDur)
              }
              msg.signs.forEach(function (s) { window.AmandlaAvatar.queueSign(s) })
            } else {
              glossEl.textContent = msg.text || msg.signs.join(' ')
            }
          }
        }
        return
      }

      // Turn indicator broadcast
      if (msg.type === 'turn') {
        setTurnIndicator(msg.speaker)
        return
      }

      if (msg.type === 'emergency') {
        showEmergency()
        return
      }

      // Backend echoes back recognised landmark sign to confirm detection
      if (msg.type === 'sign' && msg.source === 'mediapipe' && msg.sender === 'deaf') {
        signPreview.textContent = '✓ ' + msg.text
        setTimeout(function () { signPreview.textContent = '' }, 1500)
        showDetectedSign(msg.text, msg.confidence || 0.8)
        return
      }
    })

    // ── TURN INDICATOR ────────────────────────────────────────
    function setTurnIndicator(speaker) {
      if (speaker === 'hearing') {
        turnEl.textContent = '🎙 Hearing person is speaking'
        turnEl.className = 'hearing'
      } else if (speaker === 'deaf') {
        turnEl.textContent = '🤟 Signer is signing'
        turnEl.className = 'deaf'
      } else {
        turnEl.textContent = 'Waiting…'
        turnEl.className = ''
      }
      // Auto-reset after 4s
      clearTimeout(window._turnTimer)
      window._turnTimer = setTimeout(function () {
        turnEl.textContent = 'Waiting…'
        turnEl.className = ''
      }, 4000)
    }

    // ── QUICK-SIGN CATEGORY BUTTONS ───────────────────────────
    const CATEGORIES = {
      'MEDICAL':   ['DOCTOR', 'NURSE', 'HOSPITAL', 'SICK', 'PAIN', 'AMBULANCE', 'MEDICINE', 'HURT', 'EMERGENCY'],
      'GREETINGS': ['HELLO', 'GOODBYE', 'PLEASE', 'THANK YOU', 'SORRY', 'YES', 'NO'],
      'EMOTIONS':  ['HAPPY', 'SAD', 'ANGRY', 'SCARED', 'LOVE', 'TIRED', 'HUNGRY', 'THIRSTY'],
      'ACTIONS':   ['HELP', 'WAIT', 'STOP', 'REPEAT', 'COME', 'GO', 'LISTEN', 'UNDERSTAND'],
      'RIGHTS':    ['RIGHTS', 'LAW', 'EQUAL', 'FREE'],
    }

    const toolbar    = document.getElementById('quick-signs')
    const catBar     = document.getElementById('category-tabs')
    let activeCat    = null

    function renderCategory(category) {
      activeCat = category
      // Highlight active tab
      catBar.querySelectorAll('.cat-tab').forEach(function (t) {
        t.classList.toggle('active', t.dataset.cat === category)
      })
      const signs = CATEGORIES[category] || []
      toolbar.innerHTML = ''
      signs.forEach(function (sign) {
        const btn = document.createElement('button')
        btn.className = 'qs-btn' + (sign === 'EMERGENCY' ? ' emergency' : '')
        btn.textContent = sign
        btn.setAttribute('aria-label', 'Send sign: ' + sign)
        btn.addEventListener('click', function () {
          if (sign === 'EMERGENCY') {
            window.amandla.send({ type: 'emergency', sender: 'deaf', timestamp: Date.now() })
            showEmergency()
            return
          }
          window.amandla.send({ type: 'sign', text: sign, sender: 'deaf', timestamp: Date.now() })
          if (window.AmandlaAvatar) window.AmandlaAvatar.playSignNow(sign)
          showDetectedSign(sign, 1.0)
          btn.classList.add('sent')
          setTimeout(function () { btn.classList.remove('sent') }, 800)
        })
        toolbar.appendChild(btn)
      })
    }

    // Build category tab buttons
    Object.keys(CATEGORIES).forEach(function (cat) {
      const tab = document.createElement('button')
      tab.className = 'cat-tab'
      tab.dataset.cat = cat
      tab.textContent = cat
      tab.setAttribute('role', 'tab')
      tab.addEventListener('click', function () { renderCategory(cat) })
      catBar.appendChild(tab)
    })
    renderCategory('MEDICAL')  // default

    // ── EMERGENCY ─────────────────────────────────────────────
    function showEmergency() {
      document.getElementById('emergency-overlay').classList.add('active')
      speakText('Emergency. Help has been alerted.')
      setTimeout(hideEmergency, 10000)
    }
    function hideEmergency() {
      document.getElementById('emergency-overlay').classList.remove('active')
    }
    window.hideEmergency = hideEmergency

    // ── SIGN DETECTION FEEDBACK ───────────────────────────────
    function showDetectedSign(signName, confidence) {
      const el = document.getElementById('detected-sign')
      if (!el) return
      el.textContent = signName
      el.className = confidence > 0.75 ? 'show high' : 'show low'
      clearTimeout(el._hideTimer)
      el._hideTimer = setTimeout(function () { el.className = '' }, 2000)
    }

    // ── HAND TRACKING (TF.js — WebGL, no WASM CDN, native 2-hand support) ──
    let handDetector  = null
    let camRunning    = false
    let lastSendTime  = 0
    const SEND_INTERVAL_MS = 600   // send landmarks at most every 600ms

    // Hand skeleton connections (21 keypoints per hand, 0=wrist)
    const HAND_CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [0,9],[9,10],[10,11],[11,12],
      [0,13],[13,14],[14,15],[15,16],
      [0,17],[17,18],[18,19],[19,20],
      [5,9],[9,13],[13,17]
    ]

    function initCamera() {
      // 640×480 for reliable two-hand detection
      navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }, audio: false })
        .then(function (stream) {
          camVideo.srcObject = stream
          camVideo.play()
          camPanel.classList.remove('hidden')
          startHandDetection()
        })
        .catch(function (err) {
          console.warn('[Camera] Access denied or unavailable:', err)
          camPanel.classList.add('hidden')
        })
    }

    async function startHandDetection() {
      if (typeof handPoseDetection === 'undefined' || typeof tf === 'undefined') {
        console.warn('[TF.js] hand-pose-detection not loaded — hand tracking unavailable')
        return
      }
      try {
        await tf.setBackend('webgl')
        await tf.ready()
        console.log('[TF.js] Backend ready:', tf.getBackend())

        handDetector = await handPoseDetection.createDetector(
          handPoseDetection.SupportedModels.MediaPipeHands,
          { runtime: 'tfjs', modelType: 'lite', maxHands: 2 }
        )
        console.log('[TF.js Hands] Detector created — maxHands=2, runtime=tfjs/WebGL')
        camRunning = true
        detectLoop()
      } catch (err) {
        console.error('[TF.js Hands] Failed to create detector:', err)
      }
    }

    async function detectLoop() {
      if (!camRunning || !handDetector) return
      if (camVideo.readyState >= 2 && camVideo.videoWidth > 0) {
        try {
          // flipHorizontal: true because getUserMedia front-camera is mirrored
          const hands = await handDetector.estimateHands(camVideo, { flipHorizontal: true })
          onHandResults(hands)
        } catch (e) { /* skip bad frame */ }
      }
      requestAnimationFrame(detectLoop)
    }

    function onHandResults(hands) {
      const ctx = camCanvas.getContext('2d')
      camCanvas.width  = camVideo.videoWidth  || 640
      camCanvas.height = camVideo.videoHeight || 480
      ctx.clearRect(0, 0, camCanvas.width, camCanvas.height)

      if (hands && hands.length > 0) {
        const allPoints     = []
        const allHandedness = []
        const W = camCanvas.width
        const H = camCanvas.height

        hands.forEach(function (hand, i) {
          const handLabel = hand.handedness   // 'Left' or 'Right' (user perspective)
          const color     = handLabel === 'Left' ? '#8B6FD4' : '#2EA880'
          const kps       = hand.keypoints    // [{x,y,name,score}] in pixel coords

          // Draw skeleton connections
          ctx.strokeStyle = color + '99'
          ctx.lineWidth   = 2
          HAND_CONNECTIONS.forEach(function (pair) {
            const a = kps[pair[0]], b = kps[pair[1]]
            if (!a || !b) return
            ctx.beginPath()
            ctx.moveTo(a.x, a.y)
            ctx.lineTo(b.x, b.y)
            ctx.stroke()
          })

          // Draw keypoint dots
          kps.forEach(function (kp) {
            ctx.beginPath()
            ctx.arc(kp.x, kp.y, 4, 0, Math.PI * 2)
            ctx.fillStyle = color
            ctx.fill()
          })

          // Accumulate — normalise to [0,1] for backend compatibility
          kps.forEach(function (kp, idx) {
            const kp3d = hand.keypoints3D && hand.keypoints3D[idx]
            allPoints.push({ id: (i * 21) + idx, x: kp.x / W, y: kp.y / H, z: kp3d ? kp3d.z : 0 })
          })
          allHandedness.push(handLabel)
        })

        // Send ALL hands in ONE WebSocket message (debounced)
        const now = Date.now()
        if (now - lastSendTime >= SEND_INTERVAL_MS) {
          lastSendTime = now
          window.amandla.send({
            type:       'landmarks',
            landmarks:  allPoints,        // up to 42 points (21 per hand)
            handedness: allHandedness,    // ['Right'], ['Left'], or ['Left','Right']
            hand_count: hands.length,
            timestamp:  now
          })
        }

        const handCount = hands.length
        console.log('[TF.js Hands] hands=' + handCount + ' labels=' + allHandedness.join(','))

        if (handBadge) {
          handBadge.textContent     = handCount === 2 ? '2 hands' : handCount + ' hand'
          handBadge.style.background = handCount === 2 ? 'rgba(46,168,128,0.8)' : 'rgba(236,201,75,0.8)'
        }
        signPreview.textContent = handCount === 2 ? 'both hands' : 'detecting...'
      } else {
        if (handBadge) { handBadge.textContent = '' }
        signPreview.textContent = ''
      }
    }


    // ── CAMERA TOGGLE ─────────────────────────────────────────
    camToggle.addEventListener('click', function () {
      if (camPanel.style.height === '0px' || camPanel.classList.contains('hidden')) {
        camPanel.style.height = '130px'
        camToggle.textContent = 'hide cam'
      } else {
        camPanel.style.height = '0px'
        camToggle.textContent = 'show cam'
      }
    })

    // ── MULTI-LANGUAGE TTS (Gap 15) ───────────────────────────
    // Whisper auto-detects the spoken language; TTS switches to match.
    const SA_LANGUAGES = {
      'en':  { tts: 'en-ZA',  label: 'English'    },
      'zu':  { tts: 'zu-ZA',  label: 'isiZulu'    },
      'xh':  { tts: 'xh-ZA',  label: 'isiXhosa'   },
      'af':  { tts: 'af-ZA',  label: 'Afrikaans'  },
      'st':  { tts: 'st-ZA',  label: 'Sesotho'    },
      'tn':  { tts: 'tn-ZA',  label: 'Setswana'   },
      'nso': { tts: 'nso-ZA', label: 'Sepedi'     },
      'ts':  { tts: 'ts-ZA',  label: 'Xitsonga'   },
      've':  { tts: 've-ZA',  label: 'Tshivenda'  },
      'nr':  { tts: 'nr-ZA',  label: 'isiNdebele' },
      'ss':  { tts: 'ss-ZA',  label: 'siSwati'    },
    }

    let currentTTSLang = 'en-ZA'

    function setDetectedLanguage(code) {
      const entry = code && SA_LANGUAGES[code]
      if (entry) currentTTSLang = entry.tts
    }

    function getBestVoice(lang) {
      const voices = window.speechSynthesis.getVoices()
      return voices.find(function (v) { return v.lang === lang })
          || voices.find(function (v) { return v.lang.startsWith(lang.split('-')[0]) })
          || voices.find(function (v) { return v.lang.startsWith('en') })
          || (voices[0] || null)
    }

    function speakText(text, lang) {
      const useLang = lang || currentTTSLang
      if (window.speechSynthesis.paused) window.speechSynthesis.resume()
      if (window.speechSynthesis.speaking) window.speechSynthesis.cancel()
      const u = new SpeechSynthesisUtterance(text)
      const voice = getBestVoice(useLang)
      if (voice) u.voice = voice
      u.rate = 0.95
      window.speechSynthesis.speak(u)
    }

    // ── ASSIST MODE — send confirmed phrase via WebSocket ─────
    window.addEventListener('amandla:assistPhrase', function (e) {
      const phrase = e.detail && e.detail.phrase
      if (!phrase) return
      window.amandla.send({ type: 'text', text: phrase, sender: 'deaf', timestamp: Date.now() })
      speakText(phrase)
    })

    // ── STATUS POLLING ────────────────────────────────────────
    async function pollStatus() {
      try {
        const r = await fetch('http://localhost:8000/api/status')
        const d = await r.json()
        statusDot.className = d.qwen === 'alive' ? '' : 'offline'
        statusDot.title     = d.qwen === 'alive' ? 'AI online' : 'AI offline'
      } catch (e) {
        statusDot.className = 'offline'
        statusDot.title     = 'Backend offline'
      }
    }
    setInterval(pollStatus, 30000)
    pollStatus()
  </script>
</body>
